<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>STAGE 1 - ツルギ VS マモル</title>
<style>*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--textbox-h:168px;--safe-bottom:env(safe-area-inset-bottom);}
html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;background:#000;color:white;overscroll-behavior:none;}
body::before{content:"";position:fixed;inset:0;background:url('./bg_stage1_city.png?v=fixed-ui-20260503') center/cover no-repeat;z-index:0;}
body::after{content:"";position:fixed;inset:0;background:linear-gradient(to bottom,rgba(255,255,255,.04),rgba(0,0,0,.10) 44%,rgba(0,0,0,.46));z-index:1;pointer-events:none;}
.scene{position:fixed;inset:0;z-index:2;width:100vw;height:100dvh;min-height:100svh;overflow:hidden;padding:calc(48px + env(safe-area-inset-top)) 0 calc(var(--textbox-h) + 24px + env(safe-area-inset-bottom));}
.character-wrap{position:absolute;left:0;right:0;top:calc(38px + env(safe-area-inset-top));bottom:calc(var(--textbox-h) + 26px + env(safe-area-inset-bottom));display:flex;align-items:flex-start;justify-content:center;pointer-events:none;overflow:hidden;}
.character{display:none;height:124%;max-height:none;max-width:min(88vw,650px);object-fit:contain;filter:drop-shadow(0 18px 24px rgba(0,0,0,.55));user-select:none;-webkit-user-drag:none;animation:pop .16s ease-out;}
.character.show{display:block;}
#tsurugi{transform:translateX(-2vw) scale(1.00);}
#mamoru{transform:translateX(2vw) scale(1.00);}
.textbox{position:fixed;z-index:5;left:clamp(10px,3vw,30px);right:clamp(10px,3vw,30px);bottom:calc(14px + env(safe-area-inset-bottom));width:auto;height:var(--textbox-h);min-height:var(--textbox-h);max-height:var(--textbox-h);overflow:hidden;padding:10px 16px 28px;border:3px solid rgba(255,255,255,.88);border-radius:18px;background:rgba(0,0,0,.82);box-shadow:0 8px 0 rgba(0,0,0,.45),0 0 28px rgba(80,190,255,.22);}
.nameplate{display:inline-block;min-width:104px;height:32px;line-height:18px;margin:0 0 6px;padding:5px 15px;border-radius:999px;border:2px solid #fff;font-size:18px;font-weight:1000;text-align:center;text-shadow:0 2px 0 #000;box-shadow:0 4px 0 rgba(0,0,0,.5);}
.nameplate.tsurugi{background:linear-gradient(#ff5a3d,#a40000);}
.nameplate.mamoru{background:linear-gradient(#6b42ff,#251067);}
#text{font-size:clamp(15px,3.2vw,21px);font-weight:900;line-height:1.28;white-space:pre-line;text-shadow:0 2px 0 #000;overflow-wrap:anywhere;height:calc(1.28em * 4);max-height:calc(1.28em * 4);overflow:hidden;}
.next{position:absolute;right:18px;bottom:9px;font-size:13px;font-weight:900;color:#fff7a6;animation:blink .9s infinite alternate;}
.back{position:fixed;left:12px;top:calc(12px + env(safe-area-inset-top));z-index:8;border:2px solid rgba(255,255,255,.85);background:rgba(0,0,0,.60);color:#fff;border-radius:999px;padding:9px 14px;font-weight:1000;}
@keyframes blink{from{opacity:.35}to{opacity:1}}
@keyframes pop{from{opacity:.25;transform:translateY(8px) scale(.99)}to{opacity:1}}
@media (orientation:landscape){
 .scene{padding-top:calc(34px + env(safe-area-inset-top));}
 .character-wrap{top:calc(28px + env(safe-area-inset-top));bottom:calc(var(--textbox-h) + 22px + env(safe-area-inset-bottom));}
 .character{height:142%;max-width:min(42vw,460px);}
 #tsurugi{transform:translateX(-1vw) scale(1.0);} #mamoru{transform:translateX(1vw) scale(1.0);}
 .textbox{left:clamp(8px,4vw,42px);right:clamp(8px,4vw,42px);bottom:calc(10px + env(safe-area-inset-bottom));height:var(--textbox-h);min-height:var(--textbox-h);max-height:var(--textbox-h);padding:9px 14px 27px;border-radius:16px;}
 .nameplate{height:28px;line-height:16px;margin-bottom:5px;padding:4px 13px;font-size:16px;min-width:90px;}
 #text{font-size:clamp(13px,2.05vw,17px);line-height:1.22;height:calc(1.22em * 4);max-height:calc(1.22em * 4);}
 .next{bottom:8px;font-size:12px;}
 .back{top:calc(8px + env(safe-area-inset-top));padding:7px 12px;font-size:13px;}
}
@media (max-width:520px) and (orientation:portrait){
 .character{height:120%;max-width:92vw;}
 #tsurugi{transform:translateX(-4vw) scale(1.05);} #mamoru{transform:translateX(3vw) scale(1.05);}
 .textbox{height:var(--textbox-h);min-height:var(--textbox-h);max-height:var(--textbox-h);}
}
@media (max-height:430px){
 :root{--textbox-h:168px;}
 .textbox{height:var(--textbox-h);min-height:var(--textbox-h);max-height:var(--textbox-h);}
 #text{font-size:clamp(12px,2.0vw,16px);line-height:1.20;height:calc(1.20em * 4);max-height:calc(1.20em * 4);}
 .nameplate{font-size:13px;padding:3px 11px;margin-bottom:4px;height:25px;line-height:15px;}
 .character{height:150%;max-width:min(38vw,380px);}
}</style>
</head>
<body>
<button class="back" onclick="backToStory(event)">← ステージ選択</button>
<div class="scene" id="scene">
  <div class="character-wrap">
    <img id="tsurugi" class="character" src="./tsurugi.png?v=transparent-bg-20260503" alt="ツルギ">
    <img id="mamoru" class="character" src="./mamoru.png?v=transparent-bg-20260503" alt="マモル">
  </div>
  <div class="textbox" id="textbox">
    <div id="name" class="nameplate tsurugi">ツルギ</div>
    <div id="text"></div>
    <div class="next">TAP ▶</div>
  </div>
</div>
<script>
const lines = [
  {speaker:'ツルギ', text:'たった一本のダガーをハートに秘めているか？'},
  {speaker:'ツルギ', text:'よお！俺の名前はツルギ！'},
  {speaker:'ツルギ', text:'超絶シンプル読み合いバトル！「ハート＆ダガー」で天下をとる男だ！'},
  {speaker:'ツルギ', text:'全国のハーダガリストをなぎ倒して、必ずハーダガマスターになってやる！'},
  {speaker:'マモル', text:'相変わらずでかい独り言だな。ツルギ。'},
  {speaker:'ツルギ', text:'げっ！いたのかマモル！'},
  {speaker:'マモル', text:'少しよからぬ情報を入手してな。
ハーダガ四天王が本格的にこの街を制圧しようとしているらしい。
なんとしてもヤツらを止めねばならん。'},
  {speaker:'ツルギ', text:'ハーダガ四天王ってあのめちゃくちゃ強い4人組だろ？？
俺もいっしょに行くぜ！'},
  {speaker:'マモル', text:'ふん。
ハーダガリストが馴れ合いとは笑わせてくれるな。
あいつらは俺1人で止めてみせる。'},
  {speaker:'ツルギ', text:'ちぇっ！
かわいげのないやつ！'},
  {speaker:'マモル', text:'だがお前と久々に勝負してやらんこともないぞ。
ツルギも四天王もまとめて倒す。
ハーダガマスターになるのはこの俺だ。'},
  {speaker:'ツルギ', text:'おもしれーじゃん！！
早速勝負しようぜ！'}
];
let idx = 0;
let clickAudioCtx = null;
let locked = false;
function getClickAudioCtx(){
  if(!clickAudioCtx) clickAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if(clickAudioCtx.state === 'suspended') clickAudioCtx.resume();
  return clickAudioCtx;
}
function playClick(){
  try{
    const ctx=getClickAudioCtx(); const now=ctx.currentTime;
    const osc=ctx.createOscillator(); const gain=ctx.createGain();
    osc.type='square'; osc.frequency.setValueAtTime(980,now); osc.frequency.exponentialRampToValueAtTime(1460,now+0.055);
    gain.gain.setValueAtTime(0.0001,now); gain.gain.exponentialRampToValueAtTime(0.36,now+0.008); gain.gain.exponentialRampToValueAtTime(0.0001,now+0.14);
    osc.connect(gain); gain.connect(ctx.destination); osc.start(now); osc.stop(now+0.15);
  }catch(e){}
}
function renderLine(){
  const line = lines[idx];
  const isT = line.speaker === 'ツルギ';
  const tsurugi = document.getElementById('tsurugi');
  const mamoru = document.getElementById('mamoru');
  tsurugi.classList.toggle('show', isT);
  mamoru.classList.toggle('show', !isT);
  const name = document.getElementById('name');
  name.textContent = line.speaker;
  name.className = 'nameplate ' + (isT ? 'tsurugi' : 'mamoru');
  document.getElementById('text').textContent = line.text;
  document.getElementById('textbox').scrollTop = 0;
}
function nextLine(){
  if(locked) return;
  locked = true;
  playClick();
  idx++;
  if(idx >= lines.length){
    sessionStorage.setItem('hd_story_stage','1');
    setTimeout(()=>{ location.href='./freebattle.html'; },170);
  }else{
    renderLine();
    setTimeout(()=>{ locked = false; },80);
  }
}
function backToStory(e){ if(e) e.stopPropagation(); playClick(); setTimeout(()=>{ location.href='./index.html#story'; },150); }
window.addEventListener('DOMContentLoaded', renderLine);
document.getElementById('scene').addEventListener('click', nextLine);
</script>
</body>
</html>
