<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>STAGE 1 - ツルギ VS マモル</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;background:#000;color:white;}
body::before{content:"";position:fixed;inset:0;background:url('./bg_stage1_city.png?v=stage1-novel-1') center/cover no-repeat;z-index:0;}
body::after{content:"";position:fixed;inset:0;background:linear-gradient(to bottom,rgba(255,255,255,.08),rgba(0,0,0,.18) 52%,rgba(0,0,0,.42));z-index:1;pointer-events:none;}
.scene{position:relative;z-index:2;width:100vw;height:100svh;min-height:100vh;overflow:hidden;}
.character{position:absolute;bottom:118px;max-height:84svh;max-width:58vw;object-fit:contain;filter:brightness(.82) saturate(.9);transition:.18s ease;user-select:none;-webkit-user-drag:none;}
.character.active{filter:brightness(1.08) saturate(1.08) drop-shadow(0 0 22px rgba(255,255,255,.35));transform:scale(1.018);}
#tsurugi{left:1.5vw;transform-origin:bottom left;}
#tsurugi.active{transform:scale(1.035);}
#mamoru{right:1.5vw;transform-origin:bottom right;}
#mamoru.active{transform:scale(1.035);}
.textbox{position:absolute;left:50%;bottom:14px;transform:translateX(-50%);width:min(94vw,980px);min-height:128px;padding:16px 18px 18px;border:3px solid rgba(255,255,255,.86);border-radius:18px;background:rgba(0,0,0,.78);box-shadow:0 8px 0 rgba(0,0,0,.42),0 0 28px rgba(80,190,255,.22);}
.nameplate{display:inline-block;min-width:120px;margin:-38px 0 8px;padding:8px 18px;border-radius:999px;border:2px solid #fff;font-size:20px;font-weight:1000;text-align:center;text-shadow:0 2px 0 #000;box-shadow:0 4px 0 rgba(0,0,0,.5);}
.nameplate.tsurugi{background:linear-gradient(#ff5a3d,#a40000);}
.nameplate.mamoru{background:linear-gradient(#6b42ff,#251067);}
#text{font-size:clamp(18px,4.4vw,28px);font-weight:900;line-height:1.48;white-space:pre-line;text-shadow:0 2px 0 #000;}
.next{position:absolute;right:18px;bottom:10px;font-size:13px;font-weight:900;color:#fff7a6;animation:blink .9s infinite alternate;}
.back{position:fixed;left:12px;top:12px;z-index:4;border:2px solid rgba(255,255,255,.85);background:rgba(0,0,0,.55);color:#fff;border-radius:999px;padding:9px 14px;font-weight:1000;}
@keyframes blink{from{opacity:.35}to{opacity:1}}
@media (orientation:landscape){
 .character{bottom:100px;max-height:88svh;max-width:45vw;}
 .textbox{min-height:112px;}
 #text{font-size:clamp(16px,2.6vw,25px);}
}
@media (max-width:520px){
 .character{bottom:145px;max-height:72svh;max-width:66vw;}
 #tsurugi{left:-9vw;}
 #mamoru{right:-13vw;}
 .textbox{min-height:154px;}
}
</style>
</head>
<body>
<button class="back" onclick="backToStory()">← ステージ選択</button>
<div class="scene" id="scene">
  <img id="tsurugi" class="character" src="./tsurugi.png?v=1" alt="ツルギ">
  <img id="mamoru" class="character" src="./mamoru.png?v=1" alt="マモル">
  <div class="textbox">
    <div id="name" class="nameplate tsurugi">ツルギ</div>
    <div id="text"></div>
    <div class="next">TAP ▶</div>
  </div>
</div>
<script>
const lines = [{"speaker": "ツルギ", "text": "ハートにたった一本のダガーを秘めるぜ！！"}, {"speaker": "ツルギ", "text": "よお！俺の名前はツルギ！"}, {"speaker": "ツルギ", "text": "超絶シンプル読み合いバトル！「ハート＆ダガー」で天下をとる男だ！"}, {"speaker": "ツルギ", "text": "全国のハーダガリストをなぎ倒して、必ずハーダガマスターになってやる！"}, {"speaker": "マモル", "text": "相変わらずでかい独り言だな。ツルギ。"}, {"speaker": "ツルギ", "text": "げっ！いたのかマモル！"}, {"speaker": "マモル", "text": "ああ。少しよからぬ情報を入手してな。ハーダガ四天王が本格的にこの街を制圧しようとしているらしい。なんとしてもヤツらを止めねばならん。"}, {"speaker": "ツルギ", "text": "ハーダガ四天王ってあのめちゃくちゃ強い4人組だろ？？\n俺もいっしょに行くぜ！"}, {"speaker": "マモル", "text": "ふん。\nハーダガリストが馴れ合いとは笑わせてくれるな。\nあいつらは俺1人で止めてみせる。"}, {"speaker": "ツルギ", "text": "ちぇっ！\n可愛げのないやつ！"}, {"speaker": "マモル", "text": "だがお前と久々に勝負してやらんこともないぞ。\nツルギも四天王もまとめて倒す。\nハーダガマスターになるのはこの俺だ。"}, {"speaker": "ツルギ", "text": "おもしれーじゃん！！\n早速勝負しようぜ！"}];
let idx = 0;
let clickAudioCtx = null;
function getClickAudioCtx(){
  if(!clickAudioCtx) clickAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if(clickAudioCtx.state === 'suspended') clickAudioCtx.resume();
  return clickAudioCtx;
}
function playClick(){
  try{
    const ctx=getClickAudioCtx(); const now=ctx.currentTime;
    const osc=ctx.createOscillator(); const gain=ctx.createGain();
    osc.type='square'; osc.frequency.setValueAtTime(980,now); osc.frequency.exponentialRampToValueAtTime(1460,now+0.055);
    gain.gain.setValueAtTime(0.0001,now); gain.gain.exponentialRampToValueAtTime(0.32,now+0.008); gain.gain.exponentialRampToValueAtTime(0.0001,now+0.14);
    osc.connect(gain); gain.connect(ctx.destination); osc.start(now); osc.stop(now+0.15);
  }catch(e){}
}
function renderLine(){
  const line = lines[idx];
  const isT = line.speaker === 'ツルギ';
  document.getElementById('name').textContent = line.speaker;
  document.getElementById('name').className = 'nameplate ' + (isT ? 'tsurugi' : 'mamoru');
  document.getElementById('text').textContent = line.text;
  document.getElementById('tsurugi').classList.toggle('active', isT);
  document.getElementById('mamoru').classList.toggle('active', !isT);
}
function nextLine(){
  playClick();
  idx++;
  if(idx >= lines.length){
    sessionStorage.setItem('hd_story_stage','1');
    setTimeout(()=>{ location.href='./freebattle.html'; },170);
  }else renderLine();
}
function backToStory(){ playClick(); setTimeout(()=>{ location.href='./index.html#story'; },150); }
window.addEventListener('DOMContentLoaded', renderLine);
document.getElementById('scene').addEventListener('click', nextLine);
document.querySelector('.textbox').addEventListener('click', e=>{ e.stopPropagation(); nextLine(); });
</script>
</body>
</html>
