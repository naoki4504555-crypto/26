<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>STAGE 1 - ツルギ VS マモル</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;min-height:100%;overflow:hidden;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;background:#000;color:white;overscroll-behavior:none;}
body::before{content:"";position:fixed;inset:0;background:url('./bg_stage1_city.png?v=stage1-novel-2') center/cover no-repeat;z-index:0;}
body::after{content:"";position:fixed;inset:0;background:linear-gradient(to bottom,rgba(255,255,255,.08),rgba(0,0,0,.18) 52%,rgba(0,0,0,.44));z-index:1;pointer-events:none;}
.scene{position:fixed;inset:0;z-index:2;width:100vw;height:100vh;height:100svh;height:100dvh;overflow:hidden;padding-bottom:env(safe-area-inset-bottom);}
.character{position:absolute;bottom:calc(var(--textbox-space, 190px) + env(safe-area-inset-bottom));max-height:calc(100dvh - var(--textbox-space, 190px) - 12px);max-width:58vw;object-fit:contain;filter:brightness(.82) saturate(.9);transition:opacity .22s ease,filter .18s ease,transform .18s ease;user-select:none;-webkit-user-drag:none;}
.character.active{filter:brightness(1.08) saturate(1.08) drop-shadow(0 0 22px rgba(255,255,255,.35));transform:scale(1.018);}
#tsurugi{left:1.5vw;transform-origin:bottom left;}
#tsurugi.active{transform:scale(1.035);}
#mamoru{right:1.5vw;transform-origin:bottom right;}
#mamoru.hidden{opacity:0;visibility:hidden;pointer-events:none;}
#mamoru.active{transform:scale(1.035);}
.textbox{position:fixed;z-index:3;left:clamp(10px,3vw,28px);right:clamp(10px,3vw,28px);bottom:calc(max(14px, env(safe-area-inset-bottom)) + 8px);width:auto;min-height:0;max-height:min(44dvh,260px);overflow-y:auto;padding:18px 18px calc(34px + env(safe-area-inset-bottom));border:3px solid rgba(255,255,255,.86);border-radius:18px;background:rgba(0,0,0,.80);box-shadow:0 8px 0 rgba(0,0,0,.42),0 0 28px rgba(80,190,255,.22);}
.nameplate{display:inline-block;min-width:120px;margin:0 0 8px;padding:8px 18px;border-radius:999px;border:2px solid #fff;font-size:20px;font-weight:1000;text-align:center;text-shadow:0 2px 0 #000;box-shadow:0 4px 0 rgba(0,0,0,.5);}
.nameplate.tsurugi{background:linear-gradient(#ff5a3d,#a40000);}
.nameplate.mamoru{background:linear-gradient(#6b42ff,#251067);}
#text{font-size:clamp(17px,4.2vw,28px);font-weight:900;line-height:1.45;white-space:pre-line;text-shadow:0 2px 0 #000;overflow-wrap:anywhere;}
.next{position:absolute;right:18px;bottom:calc(10px + env(safe-area-inset-bottom));font-size:13px;font-weight:900;color:#fff7a6;animation:blink .9s infinite alternate;}
.back{position:fixed;left:12px;top:calc(12px + env(safe-area-inset-top));z-index:4;border:2px solid rgba(255,255,255,.85);background:rgba(0,0,0,.55);color:#fff;border-radius:999px;padding:9px 14px;font-weight:1000;}
@keyframes blink{from{opacity:.35}to{opacity:1}}
@media (orientation:landscape){
 .scene{--textbox-space:132px;}
 .character{max-height:calc(100dvh - var(--textbox-space,132px) - 8px);max-width:44vw;}
 .textbox{left:clamp(8px,4vw,42px);right:clamp(8px,4vw,42px);bottom:calc(max(8px, env(safe-area-inset-bottom)) + 6px);max-height:min(48dvh,176px);padding:10px 16px calc(26px + env(safe-area-inset-bottom));border-radius:16px;}
 .nameplate{margin:0 0 5px;padding:5px 14px;font-size:clamp(14px,2.2vw,18px);min-width:96px;}
 #text{font-size:clamp(14px,2.35vw,21px);line-height:1.30;}
 .next{bottom:calc(6px + env(safe-area-inset-bottom));}
 .back{top:calc(8px + env(safe-area-inset-top));padding:7px 12px;font-size:13px;}
}
@media (max-width:520px) and (orientation:portrait){
 .scene{--textbox-space:210px;}
 .character{max-height:calc(100dvh - var(--textbox-space,210px) - 18px);max-width:66vw;}
 #tsurugi{left:-9vw;}
 #mamoru{right:-13vw;}
 .textbox{max-height:min(42dvh,260px);bottom:calc(max(12px, env(safe-area-inset-bottom)) + 8px);}
}
@media (max-height:430px){
 .scene{--textbox-space:118px;}
 .textbox{max-height:52dvh;padding-top:8px;padding-bottom:calc(24px + env(safe-area-inset-bottom));}
 .character{max-height:calc(100dvh - var(--textbox-space,118px) - 4px);}
 #text{font-size:clamp(13px,2.3vw,19px);line-height:1.24;}
 .nameplate{font-size:13px;padding:4px 12px;}
}
</style>
</head>
<body>
<button class="back" onclick="backToStory()">← ステージ選択</button>
<div class="scene" id="scene">
  <img id="tsurugi" class="character" src="./tsurugi.png?v=1" alt="ツルギ">
  <img id="mamoru" class="character hidden" src="./mamoru.png?v=1" alt="マモル">
  <div class="textbox">
    <div id="name" class="nameplate tsurugi">ツルギ</div>
    <div id="text"></div>
    <div class="next">TAP ▶</div>
  </div>
</div>
<script>
const lines = [{"speaker": "ツルギ", "text": "ハートにたった一本のダガーを秘めるぜ！！"}, {"speaker": "ツルギ", "text": "よお！俺の名前はツルギ！"}, {"speaker": "ツルギ", "text": "超絶シンプル読み合いバトル！「ハート＆ダガー」で天下をとる男だ！"}, {"speaker": "ツルギ", "text": "全国のハーダガリストをなぎ倒して、必ずハーダガマスターになってやる！"}, {"speaker": "マモル", "text": "相変わらずでかい独り言だな。ツルギ。"}, {"speaker": "ツルギ", "text": "げっ！いたのかマモル！"}, {"speaker": "マモル", "text": "ああ。少しよからぬ情報を入手してな。ハーダガ四天王が本格的にこの街を制圧しようとしているらしい。なんとしてもヤツらを止めねばならん。"}, {"speaker": "ツルギ", "text": "ハーダガ四天王ってあのめちゃくちゃ強い4人組だろ？？\n俺もいっしょに行くぜ！"}, {"speaker": "マモル", "text": "ふん。\nハーダガリストが馴れ合いとは笑わせてくれるな。\nあいつらは俺1人で止めてみせる。"}, {"speaker": "ツルギ", "text": "ちぇっ！\n可愛げのないやつ！"}, {"speaker": "マモル", "text": "だがお前と久々に勝負してやらんこともないぞ。\nツルギも四天王もまとめて倒す。\nハーダガマスターになるのはこの俺だ。"}, {"speaker": "ツルギ", "text": "おもしれーじゃん！！\n早速勝負しようぜ！"}];
let idx = 0;
let mamoruRevealed = false;
let clickAudioCtx = null;
function getClickAudioCtx(){
  if(!clickAudioCtx) clickAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if(clickAudioCtx.state === 'suspended') clickAudioCtx.resume();
  return clickAudioCtx;
}
function playClick(){
  try{
    const ctx=getClickAudioCtx(); const now=ctx.currentTime;
    const osc=ctx.createOscillator(); const gain=ctx.createGain();
    osc.type='square'; osc.frequency.setValueAtTime(980,now); osc.frequency.exponentialRampToValueAtTime(1460,now+0.055);
    gain.gain.setValueAtTime(0.0001,now); gain.gain.exponentialRampToValueAtTime(0.32,now+0.008); gain.gain.exponentialRampToValueAtTime(0.0001,now+0.14);
    osc.connect(gain); gain.connect(ctx.destination); osc.start(now); osc.stop(now+0.15);
  }catch(e){}
}
function renderLine(){
  const line = lines[idx];
  const isT = line.speaker === 'ツルギ';
  const tsurugi = document.getElementById('tsurugi');
  const mamoru = document.getElementById('mamoru');
  if(!isT){
    mamoruRevealed = true;
    mamoru.classList.remove('hidden');
  }
  document.getElementById('name').textContent = line.speaker;
  document.getElementById('name').className = 'nameplate ' + (isT ? 'tsurugi' : 'mamoru');
  document.getElementById('text').textContent = line.text;
  tsurugi.classList.toggle('active', isT);
  mamoru.classList.toggle('active', !isT);
  mamoru.classList.toggle('hidden', !mamoruRevealed);
}
function nextLine(){
  playClick();
  idx++;
  if(idx >= lines.length){
    sessionStorage.setItem('hd_story_stage','1');
    setTimeout(()=>{ location.href='./freebattle.html'; },170);
  }else renderLine();
}
function backToStory(){ playClick(); setTimeout(()=>{ location.href='./index.html#story'; },150); }
window.addEventListener('DOMContentLoaded', renderLine);
document.getElementById('scene').addEventListener('click', nextLine);
document.querySelector('.textbox').addEventListener('click', e=>{ e.stopPropagation(); nextLine(); });
</script>
</body>
</html>
