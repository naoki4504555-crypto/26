<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HEART & DAGGER MASTER</title>
<style>
html,body{
  margin:0;
  width:100%;
  height:100%;
  background:#000;
  overflow:hidden;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
.title-screen{
  position:relative;
  width:100vw;
  height:100svh;
  min-height:100vh;
  background:#000;
  display:grid;
  place-items:center;
}
.title-image{
  width:100%;
  height:100%;
  object-fit:contain;
  object-position:center center;
  display:block;
  user-select:none;
  -webkit-user-drag:none;
}
.menu{
  position:absolute;
  left:50%;
  top:60%;
  transform:translate(-50%,-50%);
  width:min(72vw,430px);
  display:flex;
  flex-direction:row;
  align-items:center;
  justify-content:center;
  gap:12px;
  z-index:10;
}
.burst{
  position:absolute;
  left:50%;
  top:60%;
  transform:translate(-50%,-50%);
  width:min(78vw,480px);
  height:105px;
  background:repeating-conic-gradient(
    from 0deg,
    rgba(255,255,255,.2) 0deg 8deg,
    rgba(255,230,0,0) 8deg 16deg
  );
  opacity:.32;
  z-index:3;
  pointer-events:none;
  -webkit-mask-image:radial-gradient(ellipse at center,#000 0 38%,transparent 72%);
  mask-image:radial-gradient(ellipse at center,#000 0 38%,transparent 72%);
}
.hd-button{
  position:relative;
  flex:1;
  max-width:205px;
  min-width:128px;
  padding:9px 12px;
  border:0;
  border-radius:16px;
  cursor:pointer;
  color:white;
  font-size:clamp(13px,3.4vw,17px);
  font-weight:1000;
  letter-spacing:.04em;
  text-shadow:0 2px 0 rgba(0,0,0,.85),0 0 8px rgba(0,0,0,.95);
  box-shadow:
    0 6px 0 rgba(42,16,0,.95),
    0 10px 15px rgba(0,0,0,.62),
    inset 0 3px 0 rgba(255,255,255,.8),
    inset 0 -5px 0 rgba(0,0,0,.28);
  transform:skew(-8deg);
  overflow:hidden;
  outline-offset:3px;
}
.hd-button::before{
  content:"";
  position:absolute;
  inset:4px;
  border-radius:12px;
  border:2px solid rgba(255,255,255,.88);
  box-shadow:inset 0 0 0 2px rgba(0,0,0,.25),0 0 10px rgba(255,255,255,.24);
  pointer-events:none;
}
.hd-button::after{
  content:"";
  position:absolute;
  left:-35%;
  top:-70%;
  width:48%;
  height:240%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.7),transparent);
  transform:rotate(23deg);
  opacity:.45;
  pointer-events:none;
}
.hd-button:active{
  transform:skew(-8deg) translateY(4px);
  box-shadow:
    0 2px 0 rgba(42,16,0,.95),
    0 5px 10px rgba(0,0,0,.6),
    inset 0 2px 0 rgba(255,255,255,.7),
    inset 0 -3px 0 rgba(0,0,0,.28);
}
.button-inner{
  display:block;
  transform:skew(8deg);
  line-height:1.05;
  white-space:nowrap;
}
.button-sub{
  display:block;
  margin-top:3px;
  font-size:.52em;
  letter-spacing:.07em;
  opacity:.93;
}
.story{
  background:linear-gradient(135deg,#fff36a 0%,#ffae18 18%,#ff3158 56%,#8d0038 100%);
  outline:2px solid #ffe45c;
}
.free{
  background:linear-gradient(135deg,#89fbff 0%,#168cff 24%,#3421d9 58%,#14004f 100%);
  outline:2px solid #8ffcff;
}
@media (max-width:430px){
  .menu{
    top:60.5%;
    width:76vw;
    gap:9px;
  }
  .burst{
    top:60.5%;
    width:82vw;
    height:92px;
  }
  .hd-button{
    min-width:0;
    padding:8px 8px;
    border-radius:14px;
    font-size:clamp(12px,3.1vw,15px);
  }
  .button-sub{
    font-size:.48em;
  }
}
@media (max-height:700px){
  .menu{
    top:61%;
    width:min(70vw,390px);
    gap:9px;
  }
  .burst{
    top:61%;
    height:88px;
  }
  .hd-button{
    padding:7px 9px;
    font-size:clamp(12px,3vw,15px);
  }
}
</style>
</head>
<body>
<main class="title-screen">
  <img class="title-image" src="./heart-dagger-title-20260430-new.jpg?v=20260430-small-horizontal" alt="HEART & DAGGER MASTER タイトルイラスト">
  <div class="burst" aria-hidden="true"></div>

  <nav class="menu" aria-label="メインメニュー">
    <button class="hd-button story" onclick="goStory()">
      <span class="button-inner">ストーリー<span class="button-sub">熱血編・準備中</span></span>
    </button>

    <button class="hd-button free" onclick="goBattle()">
      <span class="button-inner">フリーバトル<span class="button-sub">今すぐ対戦！</span></span>
    </button>
  </nav>
</main>


<script>
let clickAudioCtx = null;

function getClickAudioCtx() {
  if (!clickAudioCtx) {
    clickAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (clickAudioCtx.state === "suspended") {
    clickAudioCtx.resume();
  }
  return clickAudioCtx;
}

function playClick() {
  try {
    const ctx = getClickAudioCtx();
    const now = ctx.currentTime;

    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.type = "square";
    osc.frequency.setValueAtTime(880, now);

    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.linearRampToValueAtTime(0.18, now + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.11);

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.start(now);
    osc.stop(now + 0.12);
  } catch (e) {
    // 音が鳴らない環境でもゲーム進行は止めない
  }
}

function goStory() {
  playClick();
  setTimeout(() => {
    alert("ストーリーモード鋭意制作中　coming soon");
  }, 120);
}

function goBattle() {
  playClick();
  sessionStorage.setItem("hd_from_title", "1");
  setTimeout(() => {
    location.href = "./freebattle.html";
  }, 120);
}
</script>

</body>
</html>
