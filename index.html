<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HEART & DAGGER MASTER</title>
<style>
html,body{
  margin:0;
  width:100%;
  height:100%;
  background:#000;
  overflow:hidden;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
.title-screen{
  position:relative;
  width:100vw;
  height:100svh;
  min-height:100vh;
  background:#000;
  display:grid;
  place-items:center;
}
.title-image{
  width:100%;
  height:100%;
  object-fit:contain;
  object-position:center center;
  display:block;
  user-select:none;
  -webkit-user-drag:none;
}
.menu{
  position:absolute;
  left:50%;
  top:58%;
  transform:translate(-50%,-50%);
  display:flex;
  flex-direction:row;
  align-items:center;
  justify-content:center;
  gap:14px;
  z-index:10;
}
.burst{
  position:absolute;
  left:50%;
  top:58%;
  transform:translate(-50%,-50%);
  width:210px;
  height:105px;
  background:repeating-conic-gradient(
    from 0deg,
    rgba(255,255,255,.2) 0deg 8deg,
    rgba(255,230,0,0) 8deg 16deg
  );
  opacity:.34;
  z-index:3;
  pointer-events:none;
  -webkit-mask-image:radial-gradient(ellipse at center,#000 0 38%,transparent 72%);
  mask-image:radial-gradient(ellipse at center,#000 0 38%,transparent 72%);
}
.circle-button{
  position:relative;
  width:82px;
  height:82px;
  border:0;
  border-radius:50%;
  cursor:pointer;
  color:white;
  font-weight:1000;
  font-size:13px;
  line-height:1.05;
  letter-spacing:.02em;
  text-shadow:0 2px 0 rgba(0,0,0,.85),0 0 8px rgba(0,0,0,.95);
  box-shadow:
    0 6px 0 rgba(28,10,0,.9),
    0 10px 16px rgba(0,0,0,.62),
    inset 0 4px 0 rgba(255,255,255,.82),
    inset 0 -6px 0 rgba(0,0,0,.3),
    0 0 14px rgba(255,255,255,.26);
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  overflow:hidden;
}
.circle-button::before{
  content:"";
  position:absolute;
  inset:6px;
  border-radius:50%;
  border:2px solid rgba(255,255,255,.88);
  box-shadow:inset 0 0 0 2px rgba(0,0,0,.22);
  pointer-events:none;
}
.circle-button::after{
  content:"";
  position:absolute;
  left:8px;
  top:7px;
  width:28px;
  height:18px;
  border-radius:50%;
  background:rgba(255,255,255,.55);
  transform:rotate(-24deg);
  filter:blur(.3px);
  pointer-events:none;
}
.circle-button:active{
  transform:translateY(4px) scale(.98);
  box-shadow:
    0 2px 0 rgba(28,10,0,.9),
    0 5px 10px rgba(0,0,0,.6),
    inset 0 3px 0 rgba(255,255,255,.72),
    inset 0 -4px 0 rgba(0,0,0,.3);
}
.circle-inner{
  position:relative;
  z-index:1;
  display:block;
}
.story{
  background:
    radial-gradient(circle at 35% 25%, #fff9a6 0%, #ffbd24 20%, #ff3158 58%, #810035 100%);
  outline:3px solid #ffe35d;
}
.free{
  background:
    radial-gradient(circle at 35% 25%, #b8ffff 0%, #1d9aff 25%, #3422d6 60%, #110047 100%);
  outline:3px solid #8ffcff;
}
@media (max-width:430px){
  .menu{
    top:58.5%;
    gap:12px;
  }
  .burst{
    top:58.5%;
    width:190px;
    height:96px;
  }
  .circle-button{
    width:72px;
    height:72px;
    font-size:11.5px;
  }
}
@media (max-height:700px){
  .menu{
    top:59%;
    gap:10px;
  }
  .burst{
    top:59%;
    width:180px;
    height:90px;
  }
  .circle-button{
    width:68px;
    height:68px;
    font-size:11px;
  }
}
</style>
</head>
<body>
<main class="title-screen">
  <img class="title-image" src="./heart-dagger-title-20260430-new.jpg?v=20260430-circle-buttons" alt="HEART & DAGGER MASTER タイトルイラスト">
  <div class="burst" aria-hidden="true"></div>

  <nav class="menu" aria-label="メインメニュー">
    <button class="circle-button story" onclick="alert('ストーリーモードは近日開幕！')">
      <span class="circle-inner">ストーリー</span>
    </button>

    <button class="circle-button free" onclick="location.href='./freebattle.html'">
      <span class="circle-inner">フリー<br>バトル</span>
    </button>
  </nav>
</main>
</body>
</html>
