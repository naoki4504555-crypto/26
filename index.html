<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HEART & DAGGER MASTER</title>
<style>
html,body{
  margin:0;
  width:100%;
  height:100%;
  background:#000;
  overflow:hidden;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
.title-screen{
  position:relative;
  width:100vw;
  height:100svh;
  min-height:100vh;
  background:#000;
  display:grid;
  place-items:center;
}
.title-image{
  width:100%;
  height:100%;
  object-fit:contain;
  object-position:center center;
  display:block;
  user-select:none;
  -webkit-user-drag:none;
}
.menu{
  position:absolute;
  left:50%;
  top:60%;
  transform:translate(-50%,-50%);
  width:min(72vw,430px);
  display:flex;
  flex-direction:row;
  align-items:center;
  justify-content:center;
  gap:12px;
  z-index:10;
}
.burst{
  position:absolute;
  left:50%;
  top:60%;
  transform:translate(-50%,-50%);
  width:min(78vw,480px);
  height:105px;
  background:repeating-conic-gradient(
    from 0deg,
    rgba(255,255,255,.2) 0deg 8deg,
    rgba(255,230,0,0) 8deg 16deg
  );
  opacity:.32;
  z-index:3;
  pointer-events:none;
  -webkit-mask-image:radial-gradient(ellipse at center,#000 0 38%,transparent 72%);
  mask-image:radial-gradient(ellipse at center,#000 0 38%,transparent 72%);
}
.hd-button{
  position:relative;
  flex:1;
  max-width:205px;
  min-width:128px;
  padding:9px 12px;
  border:0;
  border-radius:16px;
  cursor:pointer;
  color:white;
  font-size:clamp(13px,3.4vw,17px);
  font-weight:1000;
  letter-spacing:.04em;
  text-shadow:0 2px 0 rgba(0,0,0,.85),0 0 8px rgba(0,0,0,.95);
  box-shadow:
    0 6px 0 rgba(42,16,0,.95),
    0 10px 15px rgba(0,0,0,.62),
    inset 0 3px 0 rgba(255,255,255,.8),
    inset 0 -5px 0 rgba(0,0,0,.28);
  transform:skew(-8deg);
  overflow:hidden;
  outline-offset:3px;
}
.hd-button::before{
  content:"";
  position:absolute;
  inset:4px;
  border-radius:12px;
  border:2px solid rgba(255,255,255,.88);
  box-shadow:inset 0 0 0 2px rgba(0,0,0,.25),0 0 10px rgba(255,255,255,.24);
  pointer-events:none;
}
.hd-button::after{
  content:"";
  position:absolute;
  left:-35%;
  top:-70%;
  width:48%;
  height:240%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.7),transparent);
  transform:rotate(23deg);
  opacity:.45;
  pointer-events:none;
}
.hd-button:active{
  transform:skew(-8deg) translateY(4px);
  box-shadow:
    0 2px 0 rgba(42,16,0,.95),
    0 5px 10px rgba(0,0,0,.6),
    inset 0 2px 0 rgba(255,255,255,.7),
    inset 0 -3px 0 rgba(0,0,0,.28);
}
.button-inner{
  display:block;
  transform:skew(8deg);
  line-height:1.05;
  white-space:nowrap;
}
.button-sub{
  display:block;
  margin-top:3px;
  font-size:.52em;
  letter-spacing:.07em;
  opacity:.93;
}
.story{
  background:linear-gradient(135deg,#fff36a 0%,#ffae18 18%,#ff3158 56%,#8d0038 100%);
  outline:2px solid #ffe45c;
}
.free{
  background:linear-gradient(135deg,#89fbff 0%,#168cff 24%,#3421d9 58%,#14004f 100%);
  outline:2px solid #8ffcff;
}

.story-screen{
  position:relative;
  width:100vw;
  height:100svh;
  min-height:100vh;
  background:
    radial-gradient(circle at 50% 10%, rgba(255,229,92,.18), transparent 28%),
    radial-gradient(circle at 15% 78%, rgba(255,49,88,.18), transparent 32%),
    radial-gradient(circle at 86% 72%, rgba(22,140,255,.18), transparent 32%),
    linear-gradient(180deg,#160012 0%,#07000b 52%,#000 100%);
  color:#fff;
  overflow:hidden;
  display:none;
}
.story-screen.is-active{display:block;}
.title-screen.is-hidden{display:none;}
.story-bg-title{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:.14;
  filter:blur(2px) saturate(1.15);
  transform:scale(1.04);
  pointer-events:none;
}
.story-overlay{
  position:absolute;
  inset:0;
  background:
    linear-gradient(180deg,rgba(0,0,0,.15),rgba(0,0,0,.82)),
    repeating-linear-gradient(135deg,rgba(255,255,255,.045) 0 2px,transparent 2px 16px);
  pointer-events:none;
}
.story-panel{
  position:relative;
  z-index:2;
  box-sizing:border-box;
  width:min(94vw,760px);
  height:100%;
  margin:0 auto;
  padding:clamp(18px,4svh,36px) clamp(14px,3vw,26px) 18px;
  display:flex;
  flex-direction:column;
  gap:14px;
}
.story-header{
  text-align:center;
  text-shadow:0 3px 0 #000,0 0 18px rgba(255,49,88,.7);
}
.story-kicker{
  display:inline-block;
  padding:4px 12px;
  border:2px solid rgba(255,255,255,.8);
  border-radius:999px;
  background:rgba(0,0,0,.45);
  font-size:12px;
  font-weight:900;
  letter-spacing:.18em;
  color:#ffe45c;
}
.story-title{
  margin:8px 0 0;
  font-size:clamp(30px,8vw,58px);
  line-height:.95;
  font-weight:1000;
  letter-spacing:.04em;
}
.story-lead{
  margin:8px auto 0;
  max-width:560px;
  font-size:clamp(12px,3.2vw,15px);
  line-height:1.55;
  color:rgba(255,255,255,.88);
}
.stage-grid{
  flex:1;
  min-height:0;
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:10px;
  align-content:center;
}
.stage-card{
  position:relative;
  min-height:84px;
  border:0;
  border-radius:18px;
  padding:12px 13px;
  color:#fff;
  text-align:left;
  cursor:pointer;
  background:linear-gradient(135deg,rgba(255,243,106,.98),rgba(255,49,88,.94) 45%,rgba(52,33,217,.92));
  box-shadow:0 7px 0 rgba(0,0,0,.75),0 12px 18px rgba(0,0,0,.52),inset 0 3px 0 rgba(255,255,255,.72);
  overflow:hidden;
}
.stage-card::before{
  content:"";
  position:absolute;
  inset:4px;
  border-radius:14px;
  border:2px solid rgba(255,255,255,.78);
  box-shadow:inset 0 0 0 2px rgba(0,0,0,.25);
  pointer-events:none;
}
.stage-card::after{
  content:"❤  ⚔  🛡";
  position:absolute;
  right:10px;
  bottom:7px;
  font-size:18px;
  opacity:.34;
  letter-spacing:2px;
}
.stage-card:active{transform:translateY(4px);box-shadow:0 3px 0 rgba(0,0,0,.75),0 7px 12px rgba(0,0,0,.5),inset 0 2px 0 rgba(255,255,255,.65);}
.stage-card.locked{
  cursor:not-allowed;
  filter:grayscale(.8) brightness(.55);
  background:linear-gradient(135deg,#4b4b4b,#181818);
}
.stage-card.clear{
  background:linear-gradient(135deg,#89fbff,#168cff 35%,#3421d9 70%,#14004f);
}
.stage-no{
  display:block;
  font-size:12px;
  font-weight:1000;
  color:#ffe45c;
  text-shadow:0 2px 0 #000;
  letter-spacing:.08em;
}
.stage-name{
  display:block;
  margin-top:4px;
  font-size:clamp(16px,4.2vw,22px);
  font-weight:1000;
  text-shadow:0 2px 0 rgba(0,0,0,.9);
}
.stage-status{
  display:inline-block;
  margin-top:7px;
  padding:3px 8px;
  border-radius:999px;
  background:rgba(0,0,0,.42);
  border:1px solid rgba(255,255,255,.45);
  font-size:11px;
  font-weight:900;
}
.story-actions{
  display:flex;
  justify-content:center;
  gap:10px;
  padding-bottom:max(8px,env(safe-area-inset-bottom));
}
.story-mini-button{
  border:2px solid rgba(255,255,255,.82);
  border-radius:999px;
  background:rgba(0,0,0,.55);
  color:#fff;
  padding:9px 16px;
  font-weight:1000;
  cursor:pointer;
  box-shadow:0 4px 0 rgba(0,0,0,.85);
}
.story-mini-button:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.85);}
.toast{
  position:absolute;
  left:50%;
  bottom:74px;
  transform:translateX(-50%) translateY(14px);
  z-index:5;
  width:max-content;
  max-width:86vw;
  padding:10px 14px;
  border:2px solid rgba(255,255,255,.8);
  border-radius:14px;
  background:rgba(0,0,0,.78);
  color:#fff;
  font-size:14px;
  font-weight:900;
  text-align:center;
  opacity:0;
  pointer-events:none;
  transition:.22s ease;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@media (orientation:landscape) and (max-height:520px){
  .story-panel{width:min(96vw,920px);padding-top:12px;gap:8px;}
  .story-title{font-size:clamp(24px,6vw,42px);}
  .story-lead{display:none;}
  .stage-grid{grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;}
  .stage-card{min-height:78px;padding:10px;}
}

@media (max-width:430px){
  .menu{
    top:60.5%;
    width:76vw;
    gap:9px;
  }
  .burst{
    top:60.5%;
    width:82vw;
    height:92px;
  }
  .hd-button{
    min-width:0;
    padding:8px 8px;
    border-radius:14px;
    font-size:clamp(12px,3.1vw,15px);
  }
  .button-sub{
    font-size:.48em;
  }
}
@media (max-height:700px){
  .menu{
    top:61%;
    width:min(70vw,390px);
    gap:9px;
  }
  .burst{
    top:61%;
    height:88px;
  }
  .hd-button{
    padding:7px 9px;
    font-size:clamp(12px,3vw,15px);
  }
}
</style>
</head>
<body>
<main class="title-screen">
  <img class="title-image" src="./heart-dagger-title-20260430-new.jpg?v=20260430-small-horizontal" alt="HEART & DAGGER MASTER タイトルイラスト">
  <div class="burst" aria-hidden="true"></div>

  <nav class="menu" aria-label="メインメニュー">
    <button class="hd-button story" onclick="goStory()">
      <span class="button-inner">ストーリー</span>
    </button>

    <button class="hd-button free" onclick="goBattle()">
      <span class="button-inner">フリーバトル</span>
    </button>
  </nav>
</main>

<section class="story-screen" id="storyScreen" aria-label="ストーリーモード">
  <img class="story-bg-title" src="./heart-dagger-title-20260430-new.jpg?v=story-bg" alt="" aria-hidden="true">
  <div class="story-overlay" aria-hidden="true"></div>
  <div class="story-panel">
    <header class="story-header">
      <span class="story-kicker">HEART & DAGGER MASTER</span>
      <h1 class="story-title">ストーリーモード</h1>
      <p class="story-lead">8つのステージを順番に攻略！ 今はタップ1つでクリアして、次のステージが解放されるテスト版です。</p>
    </header>

    <div class="stage-grid" id="stageGrid" aria-label="ステージ一覧"></div>

    <div class="story-actions">
      <button class="story-mini-button" onclick="backTitle()">タイトルに戻る</button>
      <button class="story-mini-button" onclick="resetStoryProgress()">進行リセット</button>
    </div>
  </div>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>
</section>

<script>
let clickAudioCtx = null;

function getClickAudioCtx() {
  if (!clickAudioCtx) {
    clickAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (clickAudioCtx.state === "suspended") {
    clickAudioCtx.resume();
  }
  return clickAudioCtx;
}

function playClick() {
  try {
    const ctx = getClickAudioCtx();
    const now = ctx.currentTime;

    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.type = "square";
    osc.frequency.setValueAtTime(880, now);

    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.linearRampToValueAtTime(0.18, now + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.11);

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.start(now);
    osc.stop(now + 0.12);
  } catch (e) {}
}

const STORY_STAGE_NAMES = [
  "はじまりの短剣",
  "盾の少女",
  "心臓の迷宮",
  "赤き一撃",
  "青き鼓動",
  "黄金の防壁",
  "ハート＆ダガー",
  "マスターへの道"
];
const STORY_PROGRESS_KEY = "hd_story_progress_v1";

function getStoryProgress(){
  return Math.max(0, Math.min(8, Number(localStorage.getItem(STORY_PROGRESS_KEY) || 0)));
}

function setStoryProgress(value){
  localStorage.setItem(STORY_PROGRESS_KEY, String(Math.max(0, Math.min(8, value))));
}

function renderStages(){
  const grid = document.getElementById("stageGrid");
  const progress = getStoryProgress();
  grid.innerHTML = "";
  STORY_STAGE_NAMES.forEach((name, i) => {
    const stageNo = i + 1;
    const isClear = stageNo <= progress;
    const isUnlocked = stageNo <= progress + 1;
    const btn = document.createElement("button");
    btn.className = "stage-card" + (isClear ? " clear" : "") + (!isUnlocked ? " locked" : "");
    btn.type = "button";
    btn.disabled = !isUnlocked;
    btn.setAttribute("aria-label", `ステージ${stageNo} ${name} ${isClear ? "クリア済み" : isUnlocked ? "挑戦可能" : "ロック中"}`);
    btn.innerHTML = `
      <span class="stage-no">STAGE ${String(stageNo).padStart(2,"0")}</span>
      <span class="stage-name">${name}</span>
      <span class="stage-status">${isClear ? "CLEAR" : isUnlocked ? "TAP TO CLEAR" : "LOCKED"}</span>
    `;
    btn.addEventListener("click", () => clearStage(stageNo));
    grid.appendChild(btn);
  });
}

let toastTimer = null;
function showToast(message){
  const toast = document.getElementById("toast");
  toast.textContent = message;
  toast.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove("show"), 1400);
}

function clearStage(stageNo){
  playClick();
  const progress = getStoryProgress();
  if(stageNo > progress + 1){
    showToast("前のステージをクリアすると解放されます");
    return;
  }
  if(stageNo > progress){
    setStoryProgress(stageNo);
    renderStages();
    showToast(stageNo >= 8 ? "全ステージクリア！" : `STAGE ${stageNo} CLEAR！ 次のステージ解放！`);
  } else {
    showToast(`STAGE ${stageNo} はクリア済み！`);
  }
}

function goStory() {
  playClick();
  setTimeout(() => {
    document.querySelector(".title-screen").classList.add("is-hidden");
    document.getElementById("storyScreen").classList.add("is-active");
    renderStages();
  }, 120);
}

function backTitle(){
  playClick();
  document.getElementById("storyScreen").classList.remove("is-active");
  document.querySelector(".title-screen").classList.remove("is-hidden");
}

function resetStoryProgress(){
  playClick();
  setStoryProgress(0);
  renderStages();
  showToast("ストーリー進行をリセットしました");
}

function goBattle() {
  playClick();
  sessionStorage.setItem("hd_freebattle_entry_time", String(Date.now()));
  setTimeout(() => {
    location.href = "./freebattle.html";
  }, 120);
}
</script>

</body>
</html>
