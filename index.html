<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>HEART & DAGGER MASTER</title>
<style>
:root{--stage-w: min(100vw, calc(100svh * 2 / 3));}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;background:#000;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#fff;overflow:hidden;}
.screen{display:none;width:100%;height:100svh;min-height:100vh;background:#000;}
.screen.active{display:block;}
.title-scroll{width:100vw;height:100svh;min-height:100vh;overflow:auto;display:flex;justify-content:center;align-items:center;background:#000;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;}
.title-stage{position:relative;width:var(--stage-w);aspect-ratio:2/3;flex:0 0 auto;}
.title-stage img{width:100%;height:100%;display:block;object-fit:contain;user-select:none;-webkit-user-drag:none;image-rendering:auto;}
.hotspot{position:absolute;border:0;background:transparent;cursor:pointer;padding:0;touch-action:manipulation;}
.hotspot:focus-visible{outline:3px solid rgba(255,255,255,.9);border-radius:18px;}
.hotspot.story{left:12.5%;top:60.1%;width:36.7%;height:6.2%;}
.hotspot.free{left:50.3%;top:60.1%;width:36.7%;height:6.2%;}
@media (orientation: landscape){
  :root{--stage-w:min(100vw,1024px);}
  .title-scroll{align-items:flex-start;}
}
.story-screen{height:100svh;min-height:100vh;overflow:auto;background:radial-gradient(circle at 50% 0%,#281077 0%,#070012 38%,#000 100%);padding:18px 14px 28px;}
.story-wrap{max-width:760px;margin:0 auto;}
.story-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px;}
.story-title{margin:0;font-size:clamp(26px,8vw,48px);font-weight:1000;line-height:1;text-shadow:0 3px 0 #000,0 0 18px #ff2f98;letter-spacing:.03em;}
.back-btn{border:2px solid rgba(255,255,255,.75);border-radius:999px;background:rgba(0,0,0,.45);color:#fff;font-weight:900;padding:9px 14px;box-shadow:0 4px 0 rgba(0,0,0,.5);}
.story-sub{margin:0 0 16px;color:#ffeef9;font-weight:800;text-shadow:0 2px 0 #000;}
.stage-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;}
.stage-card{position:relative;min-height:116px;border:3px solid rgba(255,255,255,.8);border-radius:18px;background:linear-gradient(135deg,rgba(255,54,130,.92),rgba(19,113,255,.88));box-shadow:0 7px 0 rgba(0,0,0,.55),inset 0 0 0 2px rgba(0,0,0,.25);color:#fff;padding:12px;text-align:left;overflow:hidden;font-weight:1000;}
.stage-card:disabled{filter:grayscale(.9) brightness(.55);opacity:.75;}
.stage-card.done{background:linear-gradient(135deg,rgba(255,202,44,.95),rgba(255,55,111,.93));}
.stage-no{font-size:15px;opacity:.95;text-shadow:0 2px 0 #000;}
.stage-name{font-size:clamp(18px,5vw,25px);margin-top:6px;text-shadow:0 3px 0 #000;}
.stage-status{position:absolute;right:12px;bottom:10px;font-size:13px;background:rgba(0,0,0,.42);border-radius:999px;padding:5px 9px;}
.clear-msg{margin-top:16px;min-height:34px;text-align:center;font-size:18px;font-weight:1000;color:#fff36a;text-shadow:0 2px 0 #000;}
@media (min-width:680px){.stage-grid{grid-template-columns:repeat(4,minmax(0,1fr));}.stage-card{min-height:150px;}}
</style>
</head>
<body>
<main id="titleScreen" class="screen active">
  <div class="title-scroll" aria-label="タイトル画面">
    <div class="title-stage">
      <img src="./title-buttons-baked.png?v=20260502-rebaked-v4" alt="HEART & DAGGER MASTER タイトル">
      <button class="hotspot story" aria-label="ストーリー" onclick="goStory()"></button>
      <button class="hotspot free" aria-label="フリーバトル" onclick="goBattle()"></button>
    </div>
  </div>
</main>

<section id="storyScreen" class="screen">
  <div class="story-screen">
    <div class="story-wrap">
      <div class="story-head">
        <h1 class="story-title">STORY</h1>
        <button class="back-btn" onclick="showTitle()">タイトルへ</button>
      </div>
      <p class="story-sub">8つのステージを順番にクリアしよう！タップするとクリア扱いで次へ進めます。</p>
      <div id="stageGrid" class="stage-grid"></div>
      <div id="clearMsg" class="clear-msg"></div>
    </div>
  </div>
</section>

<audio id="storyBgm" src="./story-bgm.mp3" loop preload="auto"></audio>

<script>
let clickAudioCtx = null;
let unlockedStage = Number(localStorage.getItem("hd_story_unlocked") || "1");
let clearedStage = Number(localStorage.getItem("hd_story_cleared") || "0");
unlockedStage = Math.max(1, Math.min(8, unlockedStage));
clearedStage = Math.max(0, Math.min(8, clearedStage));

function getClickAudioCtx(){
  if(!clickAudioCtx){clickAudioCtx = new (window.AudioContext || window.webkitAudioContext)();}
  if(clickAudioCtx.state === "suspended"){clickAudioCtx.resume();}
  return clickAudioCtx;
}
function playClick(){
  try{
    const ctx=getClickAudioCtx();
    const now=ctx.currentTime;
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();
    osc.type="square";
    osc.frequency.setValueAtTime(980,now);
    osc.frequency.exponentialRampToValueAtTime(1460,now+0.055);
    gain.gain.setValueAtTime(0.0001,now);
    gain.gain.exponentialRampToValueAtTime(0.34,now+0.008);
    gain.gain.exponentialRampToValueAtTime(0.0001,now+0.14);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(now);
    osc.stop(now+0.15);
  }catch(e){}
}
function startStoryBgm(){
  const bgm=document.getElementById('storyBgm');
  if(!bgm)return;
  bgm.volume=0.42;
  bgm.play().catch(()=>{
    const retry=()=>{bgm.play().catch(()=>{});document.body.removeEventListener('pointerdown',retry);document.body.removeEventListener('click',retry);};
    document.body.addEventListener('pointerdown',retry,{once:true});
    document.body.addEventListener('click',retry,{once:true});
  });
}
function stopStoryBgm(){
  const bgm=document.getElementById('storyBgm');
  if(!bgm)return;
  bgm.pause();
}
function showTitle(){playClick();stopStoryBgm();document.getElementById('storyScreen').classList.remove('active');document.getElementById('titleScreen').classList.add('active');}
function goStory(){playClick();renderStages();document.getElementById('titleScreen').classList.remove('active');document.getElementById('storyScreen').classList.add('active');startStoryBgm();}
function goBattle(){playClick();sessionStorage.setItem("hd_freebattle_entry_time", String(Date.now()));setTimeout(()=>{location.href="./freebattle.html";},170);}
function renderStages(){
  const names=["はじまりの短剣","盾の試練","心臓の読み合い","黒き挑戦者","速攻の一撃","博士の記録","宿命の決闘","マスターへの道"];
  const grid=document.getElementById('stageGrid'); grid.innerHTML='';
  for(let i=1;i<=8;i++){
    const b=document.createElement('button'); b.className='stage-card';
    if(i<=clearedStage)b.classList.add('done');
    b.disabled=i>unlockedStage;
    b.innerHTML=`<div class="stage-no">STAGE ${i}</div><div class="stage-name">${names[i-1]}</div><div class="stage-status">${i<=clearedStage?'CLEAR':i===unlockedStage?'PLAY':'LOCK'}</div>`;
    b.onclick=()=>clearStage(i); grid.appendChild(b);
  }
}
function clearStage(i){
  playClick();
  if(i>unlockedStage)return;
  clearedStage=Math.max(clearedStage,i);
  unlockedStage=Math.min(8,Math.max(unlockedStage,i+1));
  localStorage.setItem("hd_story_cleared",String(clearedStage));
  localStorage.setItem("hd_story_unlocked",String(unlockedStage));
  document.getElementById('clearMsg').textContent = i===8 ? "全ステージクリア！" : `STAGE ${i} CLEAR！ 次のステージが解放された！`;
  renderStages();
}
</script>
</body>
</html>
